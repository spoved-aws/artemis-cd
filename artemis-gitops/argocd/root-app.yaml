apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: artemis
  namespace: argocd
spec:
  project: artemis

  source:
    repoURL: https://github.com/spoved-aws/artemis-cd.git
    targetRevision: main
    path: artemis-gitops/argocd/applications   # 👈 points to child apps
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true