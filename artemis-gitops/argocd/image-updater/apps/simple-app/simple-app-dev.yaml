apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: simple-app-dev-updater
  namespace: argocd

spec:
  namespace: argocd

  applicationRefs:
    - namePattern: simple-app-dev
      images:
        - alias: simple-app # --> this is an identifier to image-updater only
          imageName: "kanukhosla10/artemis-simple-app"
          commonUpdateSettings:
            updateStrategy: newest-build
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"

  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: "https://github.com/spoved-aws/artemis-cd.git"
      branch: "main"
      writeBackTarget: "helmvalues:/apps/simple-app/dev/values.yaml"
      commitMessage: "chore(deps): Updating img tag from {{ .OldTag }} to {{ .NewTag }} [skip ci]"