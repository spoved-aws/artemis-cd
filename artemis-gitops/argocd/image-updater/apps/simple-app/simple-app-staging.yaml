apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: simple-app-staging-updater
  namespace: argocd

spec:
  namespace: argocd

  applicationRefs:
    - namePattern: simple-app-staging
      images:
        - alias: simple-app # --> this is an identifier to image-updater only
          imageName: "kanukhosla10/artemis-simple-app"

          commonUpdateSettings:
            updateStrategy: newest-build
            allowTags: regexp:^sha-.*
            
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"

  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: "https://github.com/spoved-aws/artemis-cd.git"
      branch: "main"
      writeBackTarget: "helmvalues:/apps/simple-app/staging/values.yaml"