apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-route
  namespace: nginx-gateway
spec:
  parentRefs:
    - name: homecluster-gateway
      namespace: nginx-gateway

  hostnames:
    - "argo.654537853.xyz"

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
          namespace: argocd
          kind: Service